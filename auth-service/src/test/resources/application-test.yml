spring:
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:auth_service_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS app
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: app
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-at-least-32-bytes-long!!
  expiration: 3600000

media:
  public-base-url: https://cdn.example.com

rabbitmq:
  exchange: test.exchange
  routing-key: user.registered
