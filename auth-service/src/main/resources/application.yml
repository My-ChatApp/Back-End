# Cấu hình duy nhất — giá trị thật trong Back-End-NDuy/.env
spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/mychatapp}
    username: ${SPRING_DATASOURCE_USERNAME:mychatapp}
    password: ${SPRING_DATASOURCE_PASSWORD:mychatapp_local}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: app
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

rabbitmq:
  exchange: ${RABBITMQ_EXCHANGE:auth.exchange}
  routing-key: ${RABBITMQ_ROUTING_KEY:auth.registered}

media:
  public-base-url: ${MEDIA_PUBLIC_BASE_URL:}

server:
  port: ${AUTH_SERVICE_PORT:8081}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

logging:
  level:
    root: INFO
    iuh.fit: DEBUG
