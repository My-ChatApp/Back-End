name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE_REPO: docker.io/baonguyen6f6562/mychatapp

jobs:
  test:
    name: Unit tests (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: |
          chmod +x scripts/ci-test.sh mvnw
          ./scripts/ci-test.sh

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/
          if-no-files-found: ignore

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend images
        env:
          IMAGE_TAG: ci-${{ github.sha }}
          IMAGE_PREFIX: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKERHUB_IMAGE_REPO || 'mychatapp' }}
          PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '1' || '0' }}
        run: |
          chmod +x scripts/ci-build-images.sh
          ./scripts/ci-build-images.sh

  deploy:
    name: Deploy to EC2 (Docker Hub)
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ci-${{ github.sha }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,EC2_APP_DIR
          script_stop: true
          script: |
            set -euo pipefail
            resolve_app_dir() {
              if [[ -n "${EC2_APP_DIR:-}" ]]; then
                echo "$EC2_APP_DIR"
                return
              fi
              if [[ -f "$HOME/MyChatApp/Back-End/docker-compose.yml" ]]; then
                echo "$HOME/MyChatApp/Back-End"
                return
              fi
              if [[ -f "$HOME/MyChatApp/docker-compose.yml" ]]; then
                echo "$HOME/MyChatApp"
                return
              fi
              echo "$HOME/MyChatApp/Back-End"
            }
            APP_DIR="$(resolve_app_dir)"
            if [[ ! -f "$APP_DIR/docker-compose.yml" ]]; then
              echo "Missing docker-compose.yml in $APP_DIR" >&2
              echo "Clone Back-End repo, then set secret EC2_APP_DIR to that path." >&2
              exit 1
            fi
            if [[ -d "$APP_DIR/.git" ]]; then
              (cd "$APP_DIR" && git pull --ff-only origin main)
            elif [[ -d "$(dirname "$APP_DIR")/.git" ]]; then
              (cd "$(dirname "$APP_DIR")" && git pull --ff-only origin main)
            fi
            cd "$APP_DIR"
            export DOCKERHUB_USERNAME DOCKERHUB_TOKEN
            chmod +x scripts/deploy-ec2.sh scripts/dockerhub-pull.sh
            ./scripts/deploy-ec2.sh --tag "$IMAGE_TAG"
