name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE_REPO: docker.io/baonguyen6f6562/mychatapp

jobs:
  test:
    name: Unit tests (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: |
          chmod +x scripts/ci-test.sh mvnw
          ./scripts/ci-test.sh

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/
          if-no-files-found: ignore

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend images
        env:
          IMAGE_TAG: ci-${{ github.sha }}
          IMAGE_PREFIX: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKERHUB_IMAGE_REPO || 'mychatapp' }}
          PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '1' || '0' }}
        run: |
          chmod +x scripts/ci-build-images.sh
          ./scripts/ci-build-images.sh
