spring:
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:user_service_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS app
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: app
        dialect: org.hibernate.dialect.H2Dialect
aws:
  s3:
    bucket: test-bucket

media:
  public-base-url: https://cdn.example.com

rabbitmq:
  friend:
    exchange: test.friend.exchange
    routing-key:
      friend-request: friend.request
      friend-accepted: friend.accepted
